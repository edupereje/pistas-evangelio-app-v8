[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/config"
  to = "/.netlify/functions/config"
  status = 200

[[redirects]]
  from = "/api/subscribe"
  to = "/.netlify/functions/subscribe"
  status = 200

[[redirects]]
  from = "/api/unsubscribe"
  to = "/.netlify/functions/unsubscribe"
  status = 200

[[redirects]]
  from = "/api/test-notification"
  to = "/.netlify/functions/test-notification"
  status = 200


[[redirects]]
  from = "/api/pistas"
  to = "/.netlify/functions/pistas"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
